<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>LearnNote</title>
    <link rel="icon" type="image/png" sizes="32x32" href="icons/icon32.png">
    <link rel="stylesheet" href="sidepanel.css?v=0.1.39">
  </head>
  <body>
    <header class="app-header">
      <a class="brand" href="#" id="openClientBrand" aria-label="打开 LearnNote 客户端">
        <img class="brand-mark" src="icons/icon48.png" width="36" height="36" alt="">
        <span><strong>LearnNote</strong><small>当前视频助手</small></span>
      </a>
      <button class="icon-button" id="refreshButton" type="button" title="重新识别" aria-label="重新识别当前视频">
        <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M20 11a8 8 0 1 0-2.34 5.66M20 4v7h-7"/></svg>
      </button>
    </header>

    <main>
      <section id="connectionCard" class="connection-card" data-state="checking" aria-live="polite">
        <span class="status-dot" aria-hidden="true"></span>
        <div><strong id="connectionTitle">正在连接客户端</strong><small id="connectionDetail">LearnNote 需要在本机运行</small></div>
        <button id="openClientButton" type="button">打开客户端</button>
      </section>

      <section class="video-card" aria-labelledby="videoTitle">
        <div class="eyebrow-row">
          <span id="platformLabel">当前页面</span>
          <span id="playingBadge" class="playing-badge" hidden><i></i>正在播放</span>
        </div>
        <h1 id="videoTitle">正在识别当前视频...</h1>
        <p id="videoMeta" class="video-meta">请在视频页面开始播放</p>

        <div id="integrityGrid" class="integrity-grid" aria-label="媒体完整性预检">
          <article data-kind="video" data-state="checking"><span>画面</span><strong>检测中</strong></article>
          <article data-kind="audio" data-state="unknown"><span>声音</span><strong>未确认</strong></article>
          <article data-kind="subtitle" data-state="unknown"><span>字幕</span><strong>未确认</strong></article>
        </div>

        <div class="preflight-summary">
          <div><span>可用候选</span><strong id="candidateCount">0</strong></div>
          <div><span>播放器时长</span><strong id="durationValue">--</strong></div>
          <div><span>预计交接</span><strong id="estimateValue">--</strong></div>
        </div>

        <p id="preflightMessage" class="preflight-message" role="status" aria-live="polite">正在读取播放器和媒体请求...</p>
      </section>

      <section class="handoff-card">
        <button id="sendButton" class="primary-button" type="button" disabled>
          <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M5 12h14M13 5l7 7-7 7"/></svg>
          <span>发送到客户端</span>
        </button>
        <div id="handoffProgress" class="handoff-progress" role="progressbar" aria-label="交接进度" aria-valuemin="0" aria-valuemax="100" aria-valuenow="0" hidden>
          <span></span>
        </div>
        <div class="handoff-row">
          <p id="handoffStatus" class="handoff-status" role="status" aria-live="polite">识别完成后即可发送</p>
          <span id="handoffPercent" hidden>0%</span>
        </div>
        <button id="openTaskButton" class="secondary-button" type="button" hidden>在客户端查看任务</button>
      </section>

      <nav class="client-links" aria-label="客户端功能">
        <button type="button" data-client-view="settings"><span>设置</span><small>模型、转写与视频处理</small><b>›</b></button>
        <button type="button" data-client-view="diagnostics"><span>连接与诊断</span><small>在客户端检查完整链路</small><b>›</b></button>
      </nav>
    </main>

    <footer>扩展只负责识别和交接，视频处理与笔记都在本机客户端完成。</footer>
    <script src="sidepanel.js?v=0.1.39"></script>
  </body>
</html>
