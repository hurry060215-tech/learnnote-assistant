<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>LearnNote</title>
    <link rel="stylesheet" href="sidepanel.css">
  </head>
  <body>
    <header class="app-header">
      <div class="brand">
        <div class="mark">LN</div>
        <div>
          <h1>LearnNote</h1>
          <p id="backendStatus">连接本地后端...</p>
        </div>
      </div>
      <div class="header-actions">
        <button id="openWebButton" class="icon-button" title="打开本地工作台" aria-label="打开本地工作台">
          <svg viewBox="0 0 24 24"><path d="M4 5h16v14H4z"/><path d="M4 9h16M9 19V9"/></svg>
        </button>
        <button id="settingsButton" class="icon-button" title="后端设置" aria-label="后端设置">
          <svg viewBox="0 0 24 24"><path d="M12 15.5A3.5 3.5 0 1 0 12 8a3.5 3.5 0 0 0 0 7.5z"/><path d="M19.4 15a1.7 1.7 0 0 0 .34 1.88l.06.06a2 2 0 1 1-2.83 2.83l-.06-.06A1.7 1.7 0 0 0 15 19.4a1.7 1.7 0 0 0-1 .6V20a2 2 0 1 1-4 0v-.09a1.7 1.7 0 0 0-1-.6 1.7 1.7 0 0 0-1.88.34l-.06.06a2 2 0 1 1-2.83-2.83l.06-.06A1.7 1.7 0 0 0 4.6 15a1.7 1.7 0 0 0-.6-1H4a2 2 0 1 1 0-4h.09a1.7 1.7 0 0 0 .6-1 1.7 1.7 0 0 0-.34-1.88l-.06-.06a2 2 0 1 1 2.83-2.83l.06.06A1.7 1.7 0 0 0 9 4.6a1.7 1.7 0 0 0 1-.6V4a2 2 0 1 1 4 0v.09a1.7 1.7 0 0 0 1 .6 1.7 1.7 0 0 0 1.88-.34l.06-.06A2 2 0 1 1 19.8 7.06l-.06.06A1.7 1.7 0 0 0 19.4 9c.22.33.42.66.6 1H20a2 2 0 1 1 0 4h-.09c-.18.34-.38.67-.51 1z"/></svg>
        </button>
      </div>
    </header>

    <main class="side-shell">
      <section class="current-card">
        <div class="section-head">
          <div>
            <span>当前播放页</span>
            <strong id="pageTitle">读取中...</strong>
          </div>
          <button id="redetectButton" class="icon-button" title="重新检测" aria-label="重新检测">
            <svg viewBox="0 0 24 24"><path d="M20 12a8 8 0 0 1-13.66 5.66M4 12A8 8 0 0 1 17.66 6.34M20 4v6h-6M4 20v-6h6"/></svg>
          </button>
        </div>
        <small id="pageUrl" class="page-url"></small>
        <div id="activeVideo" class="playback-card">等待播放状态</div>
        <div id="playbackReadiness" class="playback-readiness" aria-label="浏览器读取状态"></div>
        <div class="mode-row">
          <span>资源直取</span>
          <span>Cookie 一次同步</span>
          <span>本地处理</span>
        </div>
      </section>

      <section class="resource-panel">
        <div class="section-head compact">
          <span>候选资源</span>
          <b id="resourceCount">0</b>
        </div>
        <div id="readiness" class="readiness">等待检测</div>
        <div id="routeSummary" class="route-summary" aria-label="学习路线"></div>
        <div id="extractionPlan" class="extraction-plan" aria-label="下载路线"></div>
        <div class="direct-flow" aria-label="当前页直取流程">
          <span>检测媒体</span>
          <span>预检直链</span>
          <span>下载本地</span>
          <span>切片总结</span>
        </div>
        <div id="resources" class="resource-list"></div>
        <div id="resourceInspector" class="resource-inspector muted"></div>
      </section>

      <details id="optionsDisclosure" class="options-disclosure">
        <summary>
          <span>处理参数</span>
          <small>切片、转写、图文总结模型</small>
        </summary>
      <section class="option-panel">
        <label>
          <span>切片</span>
          <select id="frameInterval">
            <option value="10">10 秒</option>
            <option value="20" selected>20 秒</option>
            <option value="30">30 秒</option>
            <option value="60">60 秒</option>
          </select>
        </label>
        <label>
          <span>视觉窗口</span>
          <select id="gridSize">
            <option value="3x3" selected>3x3</option>
            <option value="2x3">2x3</option>
            <option value="4x3">4x3</option>
          </select>
        </label>
        <label>
          <span>转写</span>
          <select id="whisperModel">
            <option value="tiny">tiny</option>
            <option value="small" selected>small</option>
            <option value="medium">medium</option>
          </select>
        </label>
        <label>
          <span>笔记</span>
          <select id="noteStyle">
            <option value="study" selected>学习</option>
            <option value="outline">大纲</option>
            <option value="exam">考点</option>
            <option value="code">演示</option>
          </select>
        </label>
        <label>
          <span>深度</span>
          <select id="summaryDepth">
            <option value="brief">简洁</option>
            <option value="standard" selected>标准</option>
            <option value="deep">深入</option>
          </select>
        </label>
        <label>
          <span>视觉模型</span>
          <input id="llmModel" type="text" placeholder="gpt-4.1-mini">
        </label>
        <label class="wide">
          <span>Base URL</span>
          <input id="llmBaseUrl" type="url" placeholder="https://api.openai.com/v1">
        </label>
        <label class="wide">
          <span>API Key（仅本次任务）</span>
          <input id="llmApiKey" type="password" autocomplete="off" placeholder="留空则本地降级">
        </label>
      </section>
      </details>

      <section class="actions">
        <button id="summarizeButton" class="primary">
          <svg viewBox="0 0 24 24"><path d="M5 12h14M13 5l7 7-7 7"/></svg>
          总结当前视频
        </button>
        <button id="preflightButton">
          <svg viewBox="0 0 24 24"><path d="M9 12l2 2 4-5"/><path d="M20 12a8 8 0 1 1-16 0 8 8 0 0 1 16 0z"/></svg>
          预检资源
        </button>
        <button id="downloadOnlyButton">
          <svg viewBox="0 0 24 24"><path d="M12 3v11M7 9l5 5 5-5M5 19h14"/></svg>
          下载本地
        </button>
        <button id="continueFromMediaButton" hidden disabled>
          <svg viewBox="0 0 24 24"><path d="M4 5h16v4H4zM4 15h16v4H4z"/><path d="M8 9v6M16 9v6"/></svg>
          继续切片总结
        </button>
        <button id="uploadButton">
          <svg viewBox="0 0 24 24"><path d="M12 3v12M7 8l5-5 5 5M4 17v3h16v-3"/></svg>
          上传本地视频
        </button>
        <button id="textButton">
          <svg viewBox="0 0 24 24"><path d="M4 6h16M4 12h16M4 18h10"/></svg>
          只总结文本
        </button>
        <input id="fileInput" type="file" accept="video/*,.mp4,.m4v,.mov,.mkv,.webm,.flv,.avi">
      </section>

      <label id="localDrop" class="local-drop">
        <svg viewBox="0 0 24 24"><path d="M12 3v12M7 8l5-5 5 5M4 17v3h16v-3"/></svg>
        <span id="localDropText">拖入本地视频作为兜底入口</span>
      </label>

      <section class="progress-panel">
        <div class="section-head compact">
          <span>处理进度</span>
          <b id="taskPhase">-</b>
        </div>
        <div class="progress"><span id="progressBar"></span></div>
        <div id="stageRail" class="stage-rail"></div>
        <p id="taskMessage">暂无任务</p>
      </section>

      <section class="history-panel">
        <div class="section-head compact">
          <span>生成历史</span>
          <button id="refreshHistoryButton" class="icon-button" title="刷新历史" aria-label="刷新历史">
            <svg viewBox="0 0 24 24"><path d="M20 12a8 8 0 0 1-13.66 5.66M4 12A8 8 0 0 1 17.66 6.34M20 4v6h-6M4 20v-6h6"/></svg>
          </button>
        </div>
        <div id="taskHistory" class="task-history muted">等待任务生成后显示最近记录</div>
      </section>

      <section class="result-panel">
        <div class="result-tabs">
          <button class="result-tab active" data-tab="note">学习笔记</button>
          <button class="result-tab" data-tab="transcript">转写</button>
          <button class="result-tab" data-tab="frames">切片</button>
          <button class="result-tab" data-tab="diagnostics">诊断</button>
          <button id="bundleButton" class="icon-button" title="导出资料包" aria-label="导出资料包">
            <svg viewBox="0 0 24 24"><path d="M4 7h16v13H4z"/><path d="M4 7l2-3h12l2 3"/><path d="M9 12h6"/></svg>
          </button>
          <button id="diagnosticsButton" class="icon-button" title="导出诊断" aria-label="导出诊断">
            <svg viewBox="0 0 24 24"><path d="M6 3h9l3 3v15H6z"/><path d="M14 3v4h4"/><path d="M9 11h6M9 15h6M9 19h3"/></svg>
          </button>
          <button id="mediaButton" class="icon-button" title="导出本地视频" aria-label="导出本地视频">
            <svg viewBox="0 0 24 24"><path d="M5 5h14v14H5z"/><path d="M10 9l5 3-5 3z"/></svg>
          </button>
          <button id="downloadButton" class="icon-button" title="导出 Markdown" aria-label="导出 Markdown">
            <svg viewBox="0 0 24 24"><path d="M12 3v11M7 9l5 5 5-5M5 19h14"/></svg>
          </button>
          <button id="copyButton" class="icon-button" title="复制笔记" aria-label="复制笔记">
            <svg viewBox="0 0 24 24"><path d="M8 8h11v13H8zM5 16H4a1 1 0 0 1-1-1V4a1 1 0 0 1 1-1h11a1 1 0 0 1 1 1v1"/></svg>
          </button>
        </div>
        <div id="result" class="result-body muted">任务完成后显示结构化结果</div>
      </section>
    </main>

    <script src="sidepanel.js"></script>
  </body>
</html>
