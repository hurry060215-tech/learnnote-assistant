name: Reliability gates

on:
  schedule:
    - cron: "23 18 * * 1"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  offline-reliability:
    runs-on: windows-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: backend/requirements.test.txt
      - name: Install test dependencies
        run: python -m pip install -r backend/requirements.test.txt
      - name: Release hardening contracts
        run: python -m unittest discover scripts/tests -p "test_release_hardening.py"
      - name: Offline model-provider contract
        run: python scripts/model-provider-contract.py --json-output "${{ runner.temp }}/model-provider-contract.json"
      - name: Synthetic 60-minute media and frame gate
        run: >
          python scripts/long-video-reliability.py
          --output-dir "D:/LearnNoteReliability/long-video"
          --keep-artifacts
      - name: Upload offline reliability evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: offline-reliability-${{ github.run_id }}
          path: |
            ${{ runner.temp }}/model-provider-contract.json
            D:/LearnNoteReliability/long-video/report.json
          if-no-files-found: warn
          retention-days: 14

  public-sample-audit:
    runs-on: windows-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: backend/requirements.test.txt
      - name: Install audit dependencies
        run: python -m pip install -r backend/requirements.test.txt
      - name: Audit public no-login sample
        shell: pwsh
        run: |
          ./scripts/audit-real-site.ps1 `
            "https://samplelib.com/sample-mp4.html" `
            -TaskProbe `
            -YtdlpProbe `
            -RequireReady `
            -TaskTimeout 180 `
            -Browser edge
      - name: Upload redacted public audit
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: public-sample-audit-${{ github.run_id }}
          path: data/test-runs/site-audits/
          if-no-files-found: warn
          retention-days: 14
