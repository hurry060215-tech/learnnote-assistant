name: Public Website

on:
  push:
    branches: [main]
    paths:
      - "site/**"
      - ".github/workflows/pages.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v6
        with:
          node-version: "24"
          cache: npm
      - name: Audit desktop and mobile website
        run: |
          npm ci
          npx playwright install --with-deps chromium
          python3 -m http.server 8793 --directory site --bind 127.0.0.1 >/tmp/learnnote-site.log 2>&1 &
          node scripts/site-visual-acceptance.cjs http://127.0.0.1:8793 "$RUNNER_TEMP/learnnote-site"
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v4
        with:
          path: site
      - name: Deploy public website
        id: deployment
        uses: actions/deploy-pages@v5
