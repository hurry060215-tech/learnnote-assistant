name: CI

on:
  push:
  pull_request:

jobs:
  checks:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - uses: actions/setup-node@v6
        with:
          node-version: "24"
      - name: Install backend dependencies
        run: python -m pip install -r backend/requirements.test.txt
      - name: Python checks
        env:
          PYTHONPATH: backend
        run: |
          python -m compileall backend/app
          python -m unittest discover backend/tests
      - name: Extension and web checks
        shell: pwsh
        run: |
          node --check extension/background.js
          node --check extension/content.js
          node --check extension/page_hook.js
          node --check extension/sidepanel.js
          node --check web/app.js
          Get-ChildItem extension/tests/*.test.mjs | ForEach-Object { node $_.FullName }
          node web/tests/markdown_render.test.mjs
      - name: Desktop and release checks
        run: |
          python -m unittest discover scripts/tests -p "test_*.py"
          python -m unittest desktop.tests.test_desktop_launcher
      - name: Release packaging smoke
        shell: pwsh
        run: |
          ./scripts/package-extension.ps1 -OutputPath "$env:RUNNER_TEMP/LearnNote-Browser-Extension.zip"
          if (-not (Test-Path "$env:RUNNER_TEMP/LearnNote-Browser-Extension.zip")) {
            throw "Extension package was not created."
          }
