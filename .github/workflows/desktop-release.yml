name: Desktop Release

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest
    env:
      PYINSTALLER_CONFIG_DIR: D:\LearnNoteBuildCache\pyinstaller
      TMP: D:\LearnNoteBuildCache\temp
      TEMP: D:\LearnNoteBuildCache\temp
      SIGNING_CERT_BASE64: ${{ secrets.WINDOWS_SIGNING_CERT_BASE64 }}
      SIGNING_CERT_PASSWORD: ${{ secrets.WINDOWS_SIGNING_CERT_PASSWORD }}
      SIGNING_TIMESTAMP_URL: ${{ secrets.WINDOWS_SIGNING_TIMESTAMP_URL }}
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: backend/requirements.test.txt
      - uses: actions/setup-node@v6
        with:
          node-version: "24"
      - name: Install desktop dependencies
        run: |
          python -m pip install -r backend/requirements.test.txt
          python -m pip install pyinstaller
          choco install innosetup --no-progress -y
      - name: Run release gate
        shell: pwsh
        run: |
          $env:PYTHONPATH = "backend"
          python -m unittest discover backend/tests
          python -m unittest discover scripts/tests -p "test_*.py"
          python -m unittest desktop.tests.test_desktop_launcher
          Get-ChildItem extension/tests/*.test.mjs | ForEach-Object { node $_.FullName }
          node web/tests/markdown_render.test.mjs
      - name: Build portable desktop client
        shell: pwsh
        run: |
          python scripts/generate-version-file.py build/learnnote-version.txt
          pyinstaller --noconfirm --clean LearnNote.spec
          @(
            "README.md",
            "LICENSE",
            "NOTICE",
            "THIRD_PARTY_NOTICES.md",
            "PRIVACY.md",
            "SECURITY.md",
            "SUPPORT.md"
          ) | ForEach-Object { Copy-Item $_ "dist/LearnNote/$_" }
          Copy-Item third_party dist/LearnNote/third_party -Recurse
          ./scripts/package-extension.ps1 -OutputPath build/LearnNote-Browser-Extension.zip
          Expand-Archive -LiteralPath build/LearnNote-Browser-Extension.zip -DestinationPath dist/LearnNote/extension -Force
          python scripts/audit-release-tree.py dist/LearnNote --output build/release-tree-audit.json
      - name: Sign Windows executable
        if: env.SIGNING_CERT_BASE64 != ''
        shell: pwsh
        run: |
          $certificate = Join-Path $env:RUNNER_TEMP "learnnote-signing.pfx"
          [IO.File]::WriteAllBytes($certificate, [Convert]::FromBase64String($env:SIGNING_CERT_BASE64))
          $timestamp = if ($env:SIGNING_TIMESTAMP_URL) { $env:SIGNING_TIMESTAMP_URL } else { "http://timestamp.digicert.com" }
          & signtool sign /fd SHA256 /td SHA256 /tr $timestamp /f $certificate /p $env:SIGNING_CERT_PASSWORD dist/LearnNote/LearnNote.exe
          & signtool verify /pa /v dist/LearnNote/LearnNote.exe
          Remove-Item -LiteralPath $certificate -Force
      - name: Package Windows release
        shell: pwsh
        run: |
          Compress-Archive -Path dist/LearnNote/* -DestinationPath LearnNote-Windows-x64.zip
          $version = (Get-Content extension/manifest.json -Raw -Encoding UTF8 | ConvertFrom-Json).version
          & "${env:ProgramFiles(x86)}\Inno Setup 6\ISCC.exe" "/DMyAppVersion=$version" scripts/learnnote-installer.iss
          Copy-Item dist-installer/LearnNote-Setup-x64.exe LearnNote-Setup-x64.exe
      - name: Sign Windows installer
        if: env.SIGNING_CERT_BASE64 != ''
        shell: pwsh
        run: |
          $certificate = Join-Path $env:RUNNER_TEMP "learnnote-signing.pfx"
          [IO.File]::WriteAllBytes($certificate, [Convert]::FromBase64String($env:SIGNING_CERT_BASE64))
          $timestamp = if ($env:SIGNING_TIMESTAMP_URL) { $env:SIGNING_TIMESTAMP_URL } else { "http://timestamp.digicert.com" }
          & signtool sign /fd SHA256 /td SHA256 /tr $timestamp /f $certificate /p $env:SIGNING_CERT_PASSWORD LearnNote-Setup-x64.exe
          & signtool verify /pa /v LearnNote-Setup-x64.exe
          Remove-Item -LiteralPath $certificate -Force
      - name: Smoke-test installed release
        shell: pwsh
        run: ./scripts/test-release-installer.ps1 -InstallerPath LearnNote-Setup-x64.exe
      - name: Smoke-test upgrade from previous release
        if: startsWith(github.ref, 'refs/tags/v')
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          $currentTag = "${{ github.ref_name }}"
          $previous = gh release list --repo "${{ github.repository }}" --limit 20 --json tagName,isDraft,isPrerelease,publishedAt |
            ConvertFrom-Json |
            Where-Object { -not $_.isDraft -and -not $_.isPrerelease -and $_.tagName -ne $currentTag } |
            Sort-Object publishedAt -Descending |
            Select-Object -First 1
          if (-not $previous) {
            Write-Host "No previous stable release is available; skipping cover-upgrade smoke."
            exit 0
          }
          $previousDir = Join-Path $env:RUNNER_TEMP "previous-release"
          New-Item -ItemType Directory -Path $previousDir -Force | Out-Null
          gh release download $previous.tagName `
            --repo "${{ github.repository }}" `
            --pattern "LearnNote-Setup-x64.exe" `
            --dir $previousDir
          ./scripts/test-upgrade-installer.ps1 `
            -PreviousInstallerPath (Join-Path $previousDir "LearnNote-Setup-x64.exe") `
            -CurrentInstallerPath "$PWD/LearnNote-Setup-x64.exe"
      - name: Package browser extension
        shell: pwsh
        run: |
          $manifest = Get-Content extension/manifest.json -Raw -Encoding UTF8 | ConvertFrom-Json
          if ("v$($manifest.version)" -ne "${{ github.ref_name }}" -and "${{ github.ref_type }}" -eq "tag") {
            throw "Tag ${{ github.ref_name }} does not match extension version v$($manifest.version)."
          }
          $extensionAsset = "LearnNote-Browser-Extension-v$($manifest.version).zip"
          ./scripts/package-extension.ps1 -OutputPath "$PWD/$extensionAsset"
          $assets = @("LearnNote-Windows-x64.zip", "LearnNote-Setup-x64.exe", $extensionAsset)
          $lines = foreach ($asset in $assets) {
            $hash = (Get-FileHash -LiteralPath $asset -Algorithm SHA256).Hash.ToLowerInvariant()
            "$hash  $asset"
          }
          $lines | Set-Content -LiteralPath SHA256SUMS.txt -Encoding ascii
      - uses: actions/upload-artifact@v4
        with:
          name: LearnNote-release-assets
          path: |
            LearnNote-Windows-x64.zip
            LearnNote-Setup-x64.exe
            LearnNote-Browser-Extension-v*.zip
            SHA256SUMS.txt
      - name: Publish GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            LearnNote-Windows-x64.zip
            LearnNote-Setup-x64.exe
            LearnNote-Browser-Extension-v*.zip
            SHA256SUMS.txt
          generate_release_notes: true
