name: Desktop Release

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: backend/requirements.desktop.txt
      - name: Install desktop dependencies
        run: |
          python -m pip install -r backend/requirements.desktop.txt
          python -m pip install pyinstaller
      - name: Build portable desktop client
        run: |
          pyinstaller --noconfirm --clean --onedir --windowed --name LearnNote `
            --paths "backend" `
            --add-data "backend;backend" `
            --add-data "web;web" `
            --add-data "extension;extension" `
            --hidden-import app.main `
            --collect-submodules app `
            --collect-submodules fastapi `
            --collect-submodules starlette `
            --collect-submodules uvicorn `
            --collect-all webview `
            --collect-all imageio_ffmpeg `
            --collect-all faster_whisper `
            --hidden-import clr `
            --hidden-import pythonnet `
            desktop/main.py
          Copy-Item README.md dist/LearnNote/README.md
          Compress-Archive -Path dist/LearnNote/* -DestinationPath LearnNote-Windows-x64.zip
      - uses: actions/upload-artifact@v4
        with:
          name: LearnNote-Windows-x64
          path: LearnNote-Windows-x64.zip
      - name: Publish GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: LearnNote-Windows-x64.zip
          generate_release_notes: true
